site_name: Sherlock Holmes
site_description: Pipeline investigativo e auditável para contratos públicos.
site_url: https://thiagocarvalhor.github.io/sherlock-holmes/
repo_url: https://github.com/thiagocarvalhor/sherlock-holmes
repo_name: thiagocarvalhor/sherlock-holmes

theme:
  name: material
  language: pt-BR
  logo: assets/images/logo-sherlock-holmes-mark.png
  favicon: assets/images/logo-sherlock-holmes-mark.png
  palette:
    - scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Alternar para tema claro
    - scheme: default
      primary: black
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Alternar para tema escuro
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - search.highlight
    - search.suggest

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - assets/stylesheets/extra.css

nav:
  - Visão geral: index.md
  - Começar: getting-started.md
  - Arquitetura: architecture.md
  - Streamlit: streamlit.md
  - CLI: cli.md
  - Dados e artefatos: data-artifacts.md
  - Relatórios auditáveis: audit-reports.md
  - Desenvolvimento: development.md
  - Roadmap: roadmap.md
  - Decisões:
      - PNCP primeiro: decisions/0001-pncp-first.md
      - OCR como fallback: decisions/0002-ocr-as-fallback.md
      - Reestruturação arquitetural: decisions/0003-architecture-restructure.md
  - Referência:
      - Comparação: reference/comparison.md
      - Evidência: reference/evidence.md
      - Revisão: reference/review.md
      - PNCP: reference/pncp.md
      - BrasilAPI: reference/brasilapi.md
      - Relatórios: reference/reporting.md
